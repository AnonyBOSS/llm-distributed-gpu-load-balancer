name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install "ruff==0.7.4"
      - name: ruff check
        # `ruff check` is the linter; rules pinned in pyproject.toml so the
        # CI surface is stable. `--output-format=github` annotates lines in
        # the GitHub PR diff view.
        run: ruff check --output-format=github .
      - name: ruff format check
        run: ruff format --check .

  unit:
    name: Unit tests + coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-services.txt
          pip install pytest pytest-cov

      - name: Run unit tests with coverage
        # 60% floor is conservative; the suite covers ~75% of the runtime
        # paths today. Bumping the floor over time guides quality without
        # blocking honest work.
        run: |
          pytest tests/unit -v \
            --cov=common --cov=lb --cov=master --cov=workers --cov=llm --cov=rag \
            --cov-report=term-missing --cov-report=xml \
            --cov-fail-under=60

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  integration:
    name: Integration tests (compose stack)
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx pytest

      - name: Start compose stack
        run: docker compose -f deploy/docker-compose.yml up -d --build

      - name: Wait for stack to be healthy
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz >/dev/null \
               && curl -fsS http://localhost:9090/-/ready >/dev/null; then
              echo "stack ready"
              exit 0
            fi
            sleep 2
          done
          echo "stack failed to become healthy"
          docker compose -f deploy/docker-compose.yml ps
          docker compose -f deploy/docker-compose.yml logs --tail=100
          exit 1

      - name: Run integration tests
        run: pytest tests/integration -v

      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
