name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-services.txt
          pip install pytest

      - name: Run unit tests
        run: pytest tests/unit -v

  integration:
    name: Integration tests (compose stack)
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install httpx pytest

      - name: Start compose stack
        run: docker compose -f deploy/docker-compose.yml up -d --build

      - name: Wait for stack to be healthy
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz >/dev/null \
               && curl -fsS http://localhost:9090/-/ready >/dev/null; then
              echo "stack ready"
              exit 0
            fi
            sleep 2
          done
          echo "stack failed to become healthy"
          docker compose -f deploy/docker-compose.yml ps
          docker compose -f deploy/docker-compose.yml logs --tail=100
          exit 1

      - name: Run integration tests
        run: pytest tests/integration -v

      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
