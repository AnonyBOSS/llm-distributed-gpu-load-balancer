# Thin upstream that fronts the LB service. The brief lists NGINX as a
# load-balancing tool; here it sits in front of one or more LB processes,
# while the meaningful routing strategies (round_robin, least_connections,
# load_aware) live in services/lb_service.py and services/master_service.py
# where worker state is visible.

events {
    worker_connections 4096;
}

http {
    upstream backend {
        # least_conn picks the upstream with the fewest active connections.
        # With one LB instance this is degenerate; scaling out the LB tier
        # later picks up real benefit without config change.
        least_conn;
        server lb:7000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8080;

        # Generous timeout so HF backend runs (which can take 20–30 s for the
        # first inference under cold start) don't 504.
        proxy_connect_timeout 5s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        # Health probe served directly by NGINX.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
