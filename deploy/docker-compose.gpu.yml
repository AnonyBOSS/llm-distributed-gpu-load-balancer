# Compose override that runs each worker on a CUDA GPU.
#
# Apply on top of the base compose file:
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.gpu.yml \
#                  up -d --build
#
# Workers load the real HuggingFace model (distilgpt2 by default) and serve
# inference from the GPU. The master + LB tiers stay on the CPU image
# because they don't run inference. NVIDIA Container Toolkit / Docker
# Desktop with WSL2-GPU is required.

services:

  worker-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gpu
    image: cse354-llm-svc-gpu:latest
    environment:
      LLM_BACKEND: hf
      LLM_MODEL: distilgpt2
      LLM_DEVICE: auto
      MAX_CONCURRENT_TASKS: "4"
      THREADPOOL_TOKENS: "100"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  worker-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gpu
    image: cse354-llm-svc-gpu:latest
    environment:
      LLM_BACKEND: hf
      LLM_MODEL: distilgpt2
      LLM_DEVICE: auto
      MAX_CONCURRENT_TASKS: "4"
      THREADPOOL_TOKENS: "100"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  worker-3:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gpu
    image: cse354-llm-svc-gpu:latest
    environment:
      LLM_BACKEND: hf
      LLM_MODEL: distilgpt2
      LLM_DEVICE: auto
      MAX_CONCURRENT_TASKS: "4"
      THREADPOOL_TOKENS: "100"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  master:
    environment:
      WORKER_HTTP_TIMEOUT_SEC: "120"
